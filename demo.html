  --paper:     #F4EFE2;
  --paper-sd:  #E8E0CC;
  --bg:        #E6DFCC;
  --ink:       #1C1C1C;
  --ink2:      #3A3328;
  --faint:     #C4B99A;
  --blue-ink:  #1A2A40;
  --red:       #C8574A;
  --shadow:    rgba(60,40,10,.14);
  --tape:      #1E1E1E;
}
[data-theme="dark"]{
  --paper:     #F2ECD8;
  --paper-sd:  #DDD5BE;
  --bg:        #141210;
  --ink:       #D8D0B8;
  --ink2:      #9A8E78;
  --faint:     #3A3428;
  --blue-ink:  #1A2A40;
  --red:       #C8574A;
  --shadow:    rgba(0,0,0,.5);
  --tape:      #111;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Special Elite',serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;overflow-x:hidden;
  transition:background .4s,color .4s;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,5vw,3rem);
  background:var(--bg);border-bottom:2px solid var(--faint);
  box-shadow:0 2px 10px var(--shadow);transition:background .4s;
}
.nav-logo{display:flex;align-items:center;gap:8px}
.wave-logo,.text-logo{display:inline-block;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0}
[data-theme="light"] .wave-logo{background-image:var(--wave-brown)}
[data-theme="dark"]  .wave-logo{background-image:var(--wave-cream)}
[data-theme="light"] .text-logo{background-image:var(--text-brown)}
[data-theme="dark"]  .text-logo{background-image:var(--text-cream)}
.nav-logo .wave-logo{width:28px;height:28px}
.nav-logo .text-logo{width:82px;height:24px}
.nav-r{display:flex;align-items:center;gap:.55rem}
.tog{display:flex;border:1.5px solid var(--faint);border-radius:50px;padding:3px;gap:2px;cursor:pointer;background:var(--bg);transition:background .4s}
.tog span{width:22px;height:22px;border-radius:50px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--ink2);transition:background .25s,color .25s}
.tog span.on{background:var(--ink);color:var(--bg)}
.nbtn{font-family:'Special Elite',serif;font-size:.76rem;padding:.36rem .9rem;border-radius:3px;border:1.5px solid var(--faint);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:.04em;transition:all .2s;text-decoration:none;display:inline-block}
.nbtn:hover,.nbtn.solid{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ── PAGE ── */
.page{
  min-height:100vh;
  padding:66px 0 80px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
}

/* ── TITLE ── */
.title{
  position:relative;z-index:2;
  text-align:center;
  padding:1.5rem clamp(1rem,5vw,3rem) 1rem;
}
.eyebrow{
  font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--red);display:block;margin-bottom:.4rem;
}
.title h1{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.9rem,5vw,3rem);
  line-height:1.1;color:var(--ink);
}
.title h1 em{font-style:normal;border-bottom:2.5px solid var(--blue-ink);padding-bottom:1px}
.title p{
  font-family:'Caveat',cursive;
  font-size:clamp(.9rem,2vw,1.1rem);
  color:var(--ink2);margin-top:.3rem;
}

/* ── STAGE wrapper ── */
.stage{
  position:relative;z-index:2;
  width:min(460px,93vw);
  display:flex;flex-direction:column;align-items:center;
}

/* ══════════════════════════════════════════
   PAPER  — the star of the show
═══════════════════════════════════════════ */
/* Clip window: only the top edge shows initially */
.paper-window{
  width:100%;
  /* Start showing just the very top — perforation strip */
  height:28px;
  overflow:visible;            /* let paper shadow breathe */
  position:relative;
  transition:height 1.05s cubic-bezier(.22,.68,0,1.15);
  /* clip so paper doesn't spill below recorder */
  clip-path:inset(0 0 0 0);
}
.paper-window.open{
  height:min(66vh,520px);
}

/* The actual paper sheet */
.paper{
  position:absolute;
  /* paper anchored at BOTTOM of window — grows upward */
  bottom:0;left:0;right:0;
  background:var(--paper);
  min-height:900px;           /* tall so text never hits bottom */
  border-radius:3px 3px 0 0;
  box-shadow:
    0 -8px 32px rgba(0,0,0,.18),
    2px 0 10px rgba(0,0,0,.07),
    -2px 0 10px rgba(0,0,0,.07),
    inset 0 0 0 1px rgba(0,0,0,.04);
  /* paper content starts near top, visible as soon as window opens */
  padding:22px 28px 60px 28px;
  transform-origin:top center;
  will-change:transform,opacity;
}

/* Slight paper colour variation */
.paper::before{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:3px 3px 0 0;
  background:radial-gradient(ellipse at 15% 8%,rgba(230,210,160,.2) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 90%,rgba(180,155,110,.1) 0%,transparent 50%);
}

/* perforation strip at very top */
.perfs{
  position:absolute;top:8px;left:0;right:0;
  display:flex;gap:22px;justify-content:center;pointer-events:none;z-index:2;
}
.perf-hole{
  width:8px;height:8px;border-radius:50%;
  background:var(--bg);border:1px solid rgba(0,0,0,.12);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.15);flex-shrink:0;
}

/* ── TYPEWRITER TEXT ── */
.paper-content{
  position:relative;z-index:1;
  margin-top:6px;
  /* Courier Prime = genuine typewriter look */
  font-family:'Courier Prime',monospace;
  font-size:clamp(.88rem,2.2vw,1rem);
  color:var(--blue-ink);
  line-height:1.75;
  letter-spacing:.01em;
}

/* each typed line */
.t-line{
  display:block;
  min-height:1.75em;
  white-space:pre-wrap;
  word-break:break-word;
  position:relative;
}

/* blinking cursor — a real typewriter block cursor */
.tcursor{
  display:inline-block;
  width:.55em;height:1.05em;
  background:var(--blue-ink);
  vertical-align:text-bottom;
  margin-left:1px;
  opacity:1;
  animation:tblink .55s step-end infinite;
}
.tcursor.off{display:none}
@keyframes tblink{0%,49%{opacity:1}50%,100%{opacity:0}}

/* ══════════════════════════════════════════
   TEAR ANIMATION — feels like ripping from a typewriter
   Phase 1: paper judders/vibrates (platen tension)
   Phase 2: top perforations stretch
   Phase 3: paper rips upward in jagged diagonal
   Phase 4: crumple-flies off
═══════════════════════════════════════════ */
@keyframes judder{
  0%  {transform:translateX(0)}
  15% {transform:translateX(-3px) rotate(-.3deg)}
  30% {transform:translateX(3px)  rotate(.3deg)}
  45% {transform:translateX(-2px) rotate(-.2deg)}
  60% {transform:translateX(2px)  rotate(.2deg)}
  75% {transform:translateX(-1px)}
  100%{transform:translateX(0)}
}
@keyframes rip{
  0%   {
    transform:translateY(0) rotate(0deg) skewX(0deg);
    opacity:1;clip-path:inset(0 0 0 0);
  }
  12%  {
    transform:translateY(-14px) rotate(-.6deg) skewX(-.5deg);
    opacity:1;clip-path:inset(0 0 0 0);
  }
  28%  {
    transform:translateY(-38px) rotate(.8deg) skewX(1deg);
    opacity:1;
    clip-path:polygon(0 2%,8% 0,16% 2.5%,24% .5%,32% 2%,40% 0,48% 2%,56% .5%,64% 1.8%,72% 0,80% 2%,88% .3%,96% 1.5%,100% 0,100% 100%,0 100%);
  }
  50%  {
    transform:translateY(-90px) rotate(2.5deg) skewX(2deg);
    opacity:.95;
    clip-path:polygon(0 4%,5% 0,11% 3%,17% 0,23% 4%,29% 1%,35% 3.5%,41% 0,47% 3%,53% .5%,59% 3%,65% 0,71% 2.5%,77% 0,83% 3%,89% .5%,95% 2%,100% 0,100% 100%,0 100%);
  }
  72%  {
    transform:translateY(-200px) rotate(-3deg) skewX(-2deg) scaleX(1.02);
    opacity:.7;
    clip-path:polygon(0 8%,4% 0,8% 6%,12% 1%,17% 7%,22% 0,27% 6%,32% 1%,37% 7%,42% 0,47% 5%,52% 1%,57% 6%,62% 0,67% 5%,72% 1%,77% 6%,82% 0,87% 5%,92% .5%,97% 4%,100% 0,100% 100%,0 100%);
  }
  88%  {
    transform:translateY(-340px) rotate(5deg) skewX(3deg) scaleX(.97);
    opacity:.3;
  }
  100% {
    transform:translateY(-480px) rotate(-8deg) skewX(-4deg) scale(.92);
    opacity:0;
  }
}

.paper.juddering{
  animation:judder .32s ease-in-out;
}
.paper.ripping{
  animation:rip .95s cubic-bezier(.4,0,.9,.6) forwards;
  transform-origin:top center;
}

/* torn stub left in machine */
.torn-stub{
  position:absolute;bottom:0;left:0;right:0;
  height:12px;
  background:var(--paper);
  display:none;
  border-radius:0;
  clip-path:polygon(
    0 100%,1% 0,2% 80%,3% 10%,4% 90%,5% 5%,6% 70%,7% 15%,8% 85%,9% 0,
    10% 75%,11% 20%,12% 90%,13% 5%,14% 65%,15% 30%,16% 80%,17% 10%,
    18% 95%,19% 0,20% 70%,21% 25%,22% 85%,23% 10%,24% 75%,25% 0,
    26% 80%,27% 20%,28% 90%,29% 5%,30% 70%,31% 15%,32% 95%,33% 0,
    34% 60%,35% 30%,36% 85%,37% 5%,38% 75%,39% 20%,40% 90%,41% 10%,
    42% 80%,43% 0,44% 70%,45% 25%,46% 95%,47% 5%,48% 65%,49% 35%,
    50% 100%,51% 30%,52% 85%,53% 5%,54% 70%,55% 20%,56% 90%,57% 0,
    58% 75%,59% 15%,60% 80%,61% 10%,62% 95%,63% 0,64% 65%,65% 25%,
    66% 90%,67% 5%,68% 70%,69% 20%,70% 85%,71% 0,72% 60%,73% 30%,
    74% 95%,75% 5%,76% 80%,77% 15%,78% 90%,79% 10%,80% 75%,81% 0,
    82% 85%,83% 20%,84% 95%,85% 5%,86% 70%,87% 25%,88% 80%,89% 10%,
    90% 90%,91% 0,92% 75%,93% 20%,94% 85%,95% 5%,96% 65%,97% 30%,
    98% 90%,99% 10%,100% 100%
  );
  box-shadow:0 -2px 8px rgba(0,0,0,.15);
}

/* ── RECORDER (minimal) ── */
.recorder{
  width:100%;
  background:var(--tape);
  border-radius:0 0 12px 12px;
  padding:.65rem 1.1rem .75rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:.75rem;
  box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;z-index:3;
}
/* slot */
.slot{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);height:5px;
  background:#0A0A0A;border-radius:0 0 3px 3px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.9);
}
.rec-brand{
  font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.18);white-space:nowrap;
}
.controls{display:flex;align-items:center;gap:.7rem}
.ctrl-btn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s,opacity .2s;
  box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  flex-shrink:0;
}
.ctrl-btn:active{transform:scale(.9)!important}
.ctrl-btn:disabled{opacity:.28;cursor:default;pointer-events:none}
.ctrl-btn svg{width:40%;height:40%}
.br{background:radial-gradient(circle at 38% 34%,#E05040,#9A2010)}
.br.on{box-shadow:0 0 0 3px rgba(200,60,40,.4),0 3px 12px rgba(200,60,40,.5)}
.bp{background:radial-gradient(circle at 38% 34%,#D0A020,#907010)}
.bs{background:radial-gradient(circle at 38% 34%,#505050,#282828)}
.rec-right{display:flex;align-items:center;gap:.55rem}
.led{
  width:7px;height:7px;border-radius:50%;background:#2A2A2A;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5);flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.led.on{background:#E05040;box-shadow:0 0 8px rgba(224,80,64,.7);animation:lp 1.3s ease-in-out infinite}
.led.pa{background:#C8A030;box-shadow:0 0 6px rgba(200,160,48,.6)}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.25}}
.ctr{
  font-family:'Special Elite',serif;font-size:.82rem;
  letter-spacing:.1em;color:#A08040;
  background:#080808;padding:.16rem .5rem;border-radius:3px;
  border:1px solid #222;box-shadow:inset 0 1px 4px rgba(0,0,0,.9);
  min-width:50px;text-align:center;
}
.rstatus{
  font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.2);min-width:52px;text-align:right;
  transition:color .3s;
}
.rstatus.on{color:rgba(224,80,60,.7)}
.rstatus.pa{color:rgba(200,160,40,.7)}

/* ── SAVED CARD ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.4);backdrop-filter:blur(4px);
}
.overlay.show{display:block}
.saved{
  display:none;position:fixed;top:50%;left:50%;z-index:500;
  width:min(340px,88vw);
  background:var(--paper);border-radius:2px;
  box-shadow:5px 7px 0 rgba(0,0,0,.12),0 24px 60px rgba(0,0,0,.35);
  padding:1.75rem 1.5rem 1.4rem;
  transform:translate(-50%,-50%) scale(.75) rotate(8deg);
  opacity:0;transition:transform .55s cubic-bezier(.34,1.56,.64,1),opacity .35s;
}
.saved.show{
  display:block;opacity:1;
  transform:translate(-50%,-50%) scale(1) rotate(-1.5deg);
}
.saved-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.saved-lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.saved-stamp{
  font-size:.58rem;border:1.5px solid var(--red);color:var(--red);
  padding:2px 7px;border-radius:2px;letter-spacing:.08em;
  transform:rotate(2.5deg);display:inline-block;
}
.saved-txt{
  font-family:'Courier Prime',monospace;
  font-size:.9rem;color:var(--blue-ink);line-height:1.75;
  white-space:pre-wrap;max-height:200px;overflow-y:auto;
}
.saved-close{
  display:block;margin:1.1rem auto 0;
  font-size:.72rem;letter-spacing:.06em;background:none;border:none;
  color:var(--ink2);cursor:pointer;border-bottom:1px solid var(--faint);
  padding-bottom:1px;font-family:'Special Elite',serif;
}
.saved-close:hover{color:var(--ink);border-color:var(--ink)}

/* ── HINTS ── */
.hints{
  position:relative;z-index:2;
  margin-top:1.5rem;display:flex;gap:1.25rem;flex-wrap:wrap;justify-content:center;
}
.hint{
  font-family:'Caveat',cursive;font-size:.95rem;color:var(--ink2);
  display:flex;align-items:center;gap:.35rem;
}
.hd{width:5px;height:5px;border-radius:50%;background:var(--red);opacity:.55;flex-shrink:0}
.back{
  position:relative;z-index:2;margin-top:1.75rem;
  font-size:.74rem;letter-spacing:.06em;color:var(--ink2);
  border-bottom:1px solid var(--faint);text-decoration:none;padding-bottom:1px;
  transition:color .2s,border-color .2s;
}
.back:hover{color:var(--ink);border-color:var(--ink)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="wave-logo"></div>
    <div class="text-logo"></div>
  </div>
  <div class="nav-r">
    <div class="tog" onclick="T()">
      <span id="di" class="on">N</span><span id="li">D</span>
    </div>
    <a href="index.html" class="nbtn">home</a>
    <a href="#" class="nbtn solid">open notebook</a>
  </div>
</nav>

<div class="overlay" id="OV" onclick="closeSaved()"></div>
<div class="saved" id="SC">
  <div class="saved-hd">
    <span class="saved-lbl">note saved</span>
    <span class="saved-stamp">SAVED</span>
  </div>
  <div class="saved-txt" id="ST"></div>
  <button class="saved-close" onclick="closeSaved()">close ×</button>
</div>

<main class="page">
  <div class="title">
    <span class="eyebrow">demo</span>
    <h1>see how it <em>works</em></h1>
    <p>press record — watch it write itself</p>
  </div>

  <div class="stage">

    <div class="paper-window" id="PW">
      <div class="paper" id="PA">
        <div class="perfs" id="PF"></div>
        <div class="torn-stub" id="STUB"></div>
        <div class="paper-content" id="PC">
          <!-- cursor lives here, moved line to line -->
        </div>
      </div>
    </div>

    <div class="recorder">
      <div class="slot"></div>
      <div class="rec-brand">scribble · mkii</div>
      <div class="controls">
        <button class="ctrl-btn br" id="BR" onclick="onRec()">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="white" opacity=".92"/></svg>
        </button>
        <button class="ctrl-btn bp" id="BP" onclick="onPause()" disabled>
          <svg viewBox="0 0 20 20">
            <rect x="5" y="4" width="3.5" height="12" rx="1.2" fill="white" opacity=".92"/>
            <rect x="11.5" y="4" width="3.5" height="12" rx="1.2" fill="white" opacity=".92"/>
          </svg>
        </button>
        <button class="ctrl-btn bs" id="BS" onclick="onStop()" disabled>
          <svg viewBox="0 0 20 20">
            <rect x="4.5" y="4.5" width="11" height="11" rx="1.5" fill="white" opacity=".92"/>
          </svg>
        </button>
      </div>
      <div class="rec-right">
        <div class="led" id="LED"></div>
        <div class="ctr" id="CTR">00:00</div>
        <div class="rstatus" id="RST">ready</div>
      </div>
    </div>

  </div>

  <div class="hints">
    <div class="hint"><div class="hd"></div>press record to begin</div>
    <div class="hint"><div class="hd"></div>stop to tear &amp; save</div>
  </div>
  <a href="index.html" class="back">← back to home</a>
</main>

<script>
/* theme */
function T(){
  const h=document.documentElement;
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');
  sync();
}
function sync(){
  const l=document.documentElement.getAttribute('data-theme')==='light';
  document.getElementById('di').classList.toggle('on',l);
  document.getElementById('li').classList.toggle('on',!l);
}
sync();

/* perforations */
const PF=document.getElementById('PF');
for(let i=0;i<13;i++){const s=document.createElement('span');s.className='perf-hole';PF.appendChild(s);}

/* dummy lines */
const LINES=[
  "walked to the park this morning,",
  "the air had that cold-clean smell",
  "like the city had just been washed.",
  "",
  "thought about calling mum --",
  "haven't in three weeks, maybe four.",
  "",
  "the idea I keep circling back to:",
  "what if the note writes itself",
  "while you're still mid-thought?",
  "",
  "no friction. no keyboard. just",
  "the voice and the page.",
  "",
  "I think that's the whole thing.",
  "that's what scribble is trying to do.",
  "",
  "capture the thought before it slips.",
  "before you lose it to the morning.",
];

/* state */
let STATE='idle';
let li=0,ci=0,secs=0;
let tTimer=null,tkTimer=null;
let curLine=null;

/* cursor */
const CUR=document.createElement('span');
CUR.className='tcursor off';

const PC=document.getElementById('PC');
const PW=document.getElementById('PW');
const PA=document.getElementById('PA');
const LED=document.getElementById('LED');
const RST=document.getElementById('RST');
const CTR=document.getElementById('CTR');
const BR=document.getElementById('BR');
const BP=document.getElementById('BP');
const BS=document.getElementById('BS');
const STUB=document.getElementById('STUB');

function showCursor(){CUR.classList.remove('off');}
function hideCursor(){CUR.classList.add('off');}

/* timer */
function startTick(){
  tkTimer=setInterval(()=>{
    secs++;
    CTR.textContent=String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
  },1000);
}
function stopTick(){clearInterval(tkTimer);}

function setUI(s){
  LED.className='led'+(s==='rec'?' on':s==='pa'?' pa':'');
  RST.className='rstatus'+(s==='rec'?' on':s==='pa'?' pa':'');
  const lbl={idle:'ready',rec:'recording',pa:'paused',stop:'stopped'};
  RST.textContent=lbl[s]||s;
  BR.classList.toggle('on',s==='rec');
  BP.disabled=(s==='idle'||s==='stop');
  BS.disabled=(s==='idle'||s==='stop');
}

/* expand paper */
function openPaper(){PW.classList.add('open');}

/* type */
function typeChar(){
  if(STATE!=='rec')return;
  if(li>=LINES.length)return;
  const line=LINES[li];

  if(ci===0){
    curLine=document.createElement('span');
    curLine.className='t-line';
    PC.appendChild(curLine);
    curLine.appendChild(CUR);
    showCursor();
  }

  if(line==='' && ci===0){
    /* blank line — just a spacer */
    curLine.innerHTML='&nbsp;';
    curLine.appendChild(CUR);
    ci=0;li++;
    tTimer=setTimeout(typeChar,260);
    return;
  }

  if(ci<line.length){
    const tn=document.createTextNode(line[ci]);
    curLine.insertBefore(tn,CUR);
    ci++;
    const delay=line[ci-1]===' '? 60+Math.random()*40 : 42+Math.random()*48;
    tTimer=setTimeout(typeChar,delay);
  }else{
    ci=0;li++;
    tTimer=setTimeout(typeChar,line===''?180:360);
  }
}

/* RECORD */
function onRec(){
  if(STATE==='idle'||STATE==='stop'){
    if(STATE==='stop')reset();
    STATE='rec';setUI('rec');
    openPaper();
    showCursor();
    startTick();
    setTimeout(typeChar,700);
  }else if(STATE==='pa'){
    STATE='rec';setUI('rec');
    showCursor();
    startTick();
    typeChar();
  }
}
/* PAUSE */
function onPause(){
  if(STATE!=='rec')return;
  STATE='pa';
  clearTimeout(tTimer);stopTick();
  hideCursor();setUI('pa');
}
/* STOP */
function onStop(){
  if(STATE!=='rec'&&STATE!=='pa')return;
  STATE='stop';
  clearTimeout(tTimer);stopTick();
  hideCursor();setUI('stop');
  BS.disabled=true;BP.disabled=true;
  setTimeout(doTear,200);
}

/* ── TEAR ── */
function doTear(){
  /* Phase 1: judder */
  PA.classList.add('juddering');
  PA.addEventListener('animationend',()=>{
    PA.classList.remove('juddering');
    /* Phase 2: rip upward */
    PA.classList.add('ripping');
    STUB.style.display='block'; /* torn stub stays */
    PA.addEventListener('animationend',()=>{
      PA.style.display='none';
      /* show saved card after rip */
      const txt=[...PC.querySelectorAll('.t-line')]
        .map(l=>l.textContent.replace(/\u00a0/g,'').trimEnd())
        .join('\n').trim();
      setTimeout(()=>showSaved(txt),150);
    },{once:true});
  },{once:true});
}

function showSaved(txt){
  document.getElementById('ST').textContent=txt;
  document.getElementById('OV').classList.add('show');
  setTimeout(()=>document.getElementById('SC').classList.add('show'),30);
}
function closeSaved(){
  document.getElementById('SC').classList.remove('show');
  document.getElementById('OV').classList.remove('show');
  setTimeout(reset,420);
}

function reset(){
  STATE='idle';
  clearTimeout(tTimer);clearInterval(tkTimer);
  secs=0;CTR.textContent='00:00';
  li=0;ci=0;curLine=null;
  PC.innerHTML='';
  PC.appendChild(CUR);
  hideCursor();
  PA.classList.remove('juddering','ripping');
  PA.style.display='';
  STUB.style.display='none';
  PW.classList.remove('open');
  setUI('idle');
}

reset();
</script>
</body>
</html>
